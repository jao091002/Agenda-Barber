<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado</title>
    <style>
        :root {
            --primary: #ff1744;
            --success: #00e676;
            --bg: #0a0a0a;
            --card: #111;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- FUNDO COM LUZES 3D --- */
        .background-lights {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .light {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 23, 68, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: float 12s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(-20%, -20%) scale(1); }
            100% { transform: translate(120%, 120%) scale(1.2); }
        }

        /* --- BOX DE SUCESSO --- */
        .box {
            width: 500px;
            background: var(--card);
            padding: 60px 40px;
            border-radius: 30px;
            border: 2px solid var(--primary);
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 23, 68, 0.2);
            backdrop-filter: blur(15px);
            animation: popIn 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Ícone de Check Animado */
        .check-icon {
            width: 80px;
            height: 80px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 30px;
            box-shadow: 0 0 20px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 23, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0); }
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #aaa;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .btn-home {
            padding: 18px 40px;
            border-radius: 50px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-home:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 23, 68, 0.4);
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <div class="background-lights">
        <div class="light" style="top: 0; left: 0;"></div>
        <div class="light" style="bottom: 0; right: 0; animation-delay: -6s;"></div>
    </div>

    <div class="box">
        <div class="check-icon">✓</div>
        <h1>Pedido Confirmado</h1>
        <p>Tudo pronto! Seu agendamento foi finalizado com sucesso. Te esperamos no horário marcado.</p>
        
        <button class="btn-home" onclick="reiniciar()">Início</button>
    </div>

    <script>
        function reiniciar() {
            // Limpa os dados do agendamento para uma nova experiência
            sessionStorage.clear();
            // Volta para a primeira tela (ajuste o nome se for diferente)
            window.location.href = 'select_service.html';
        }
    </script>
</body>
</html>
