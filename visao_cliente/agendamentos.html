<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Agendamentos - Agenda Barber</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
    background:#0a0a0a;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    color:#fff;
    overflow:hidden;
    perspective:1200px;
}

/* BASTÕES 3D */
.barber-poles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;}
.barber-pole{position:absolute;transform-style:preserve-3d;}
.pole-1{top:10%;right:5%;width:380px;height:130px;animation:poleFloat1 25s infinite,poleRotate1 10s linear infinite;}
.pole-2{top:45%;left:8%;width:300px;height:100px;animation:poleFloat2 30s infinite,poleRotate2 12s linear infinite;}
.pole-3{bottom:25%;right:12%;width:260px;height:85px;animation:poleFloat3 35s infinite,poleRotate3 15s linear infinite;}

.pole-cylinder{
    width:100%;height:100%;border-radius:65px;
    background:conic-gradient(from 0deg,#dc143c 0 90deg,#8b0000 90deg 180deg,#fff 180deg 270deg,#ff1744 270deg 360deg);
    box-shadow:0 0 60px rgba(220,20,60,.8),0 0 120px rgba(255,23,68,.4);
}

@keyframes poleFloat1{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
@keyframes poleRotate1{to{transform:rotateZ(360deg)}}
@keyframes poleFloat2{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes poleRotate2{to{transform:rotateZ(-360deg)}}
@keyframes poleFloat3{0%,100%{transform:translateY(0)}50%{transform:translateY(-25px)}}
@keyframes poleRotate3{to{transform:rotateZ(360deg)}}

/* NEON */
.neon-bg{
    position:fixed;width:400px;height:400px;
    background:radial-gradient(circle,rgba(255,23,68,.4),transparent 70%);
    filter:blur(50px);animation:pulse 8s infinite;z-index:-1;
}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.8;transform:scale(1.2)}}

/* CONTAINER */
.container{
    max-width:700px;width:95%;
    background:rgba(8,8,8,.96);
    backdrop-filter:blur(40px);
    border-radius:32px;
    padding:50px;
    border:2px solid rgba(255,23,68,.5);
    box-shadow:0 50px 100px rgba(0,0,0,.9),0 0 80px rgba(220,20,60,.3);
    animation:float 6s ease-in-out infinite alternate;
}
@keyframes float{from{transform:translateZ(0)}to{transform:translateZ(40px) rotateX(2deg)}}

h1{
    text-align:center;
    font-size:2.5rem;
    margin-bottom:30px;
    background:linear-gradient(135deg,#ff1744,#dc143c,#ff6b9d);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* LISTA */
.agendamento{
    background:rgba(20,20,20,.9);
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
    border:1px solid rgba(255,23,68,.3);
    transition:.3s;
}
.agendamento:hover{
    transform:translateY(-5px);
    border-color:#ff1744;
    box-shadow:0 0 25px rgba(255,23,68,.4);
}

.agendamento strong{
    color:#ff1744;
}

.btn{
    margin-top:15px;
    padding:10px 15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
}

.btn-delete{
    background:#ff1744;
    color:#fff;
}

.btn-voltar{
    margin-top:30px;
    width:100%;
    padding:15px;
    background:linear-gradient(135deg,#ff1744,#dc143c);
    border:none;
    border-radius:18px;
    font-weight:800;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="barber-poles">
    <div class="barber-pole pole-1"><div class="pole-cylinder"></div></div>
    <div class="barber-pole pole-2"><div class="pole-cylinder"></div></div>
    <div class="barber-pole pole-3"><div class="pole-cylinder"></div></div>
</div>

<div class="neon-bg"></div>

<div class="container">
<h1>Meus Agendamentos</h1>

<div id="listaAgendamentos"></div>

<button class="btn-voltar" onclick="window.location.href='select_service.html'">
Voltar
</button>
</div>

<script>
if(!sessionStorage.getItem("usuarioLogado")){
    window.location.href="login.html";
}

const usuario = sessionStorage.getItem("usuarioLogado");
let agendamentos = JSON.parse(localStorage.getItem("agendamentos")) || [];

const lista = document.getElementById("listaAgendamentos");

function render(){
    lista.innerHTML="";

    const meus = agendamentos.filter(a => a.usuario === usuario);

    if(meus.length === 0){
        lista.innerHTML="<p style='text-align:center;color:rgba(255,255,255,.5)'>Nenhum agendamento encontrado.</p>";
        return;
    }

    meus.forEach((ag,index)=>{
        const div=document.createElement("div");
        div.className="agendamento";
        div.innerHTML=`
            <p><strong>Serviços:</strong> ${ag.servicos.join(", ")}</p>
            <p><strong>Horário:</strong> ${ag.horario}</p>
            <p><strong>Total:</strong> R$ ${ag.total}</p>
            <button class="btn btn-delete" onclick="excluir(${index})">Excluir</button>
        `;
        lista.appendChild(div);
    });
}

function excluir(index){
    agendamentos.splice(index,1);
    localStorage.setItem("agendamentos",JSON.stringify(agendamentos));
    render();
}

render();
</script>

</body>
</html>
